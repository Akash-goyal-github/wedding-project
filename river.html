<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manish &amp; Arjoo · 26 April 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/river.css">
</head>
<body>

  <div class="rot-scene" id="rotScene">

    <!-- ── Atmospheric background layers (z-stacked bottom-up) ── -->
    <div class="rot-sky"     aria-hidden="true"></div>
    <div class="rot-water"   aria-hidden="true"></div>
    <canvas class="rot-caustics" id="rotCaustics" aria-hidden="true"></canvas>
    <div class="rot-shimmer" aria-hidden="true"></div>
    <div class="rot-mist"    aria-hidden="true"></div>

    <!-- Global SVG filter for the together reflection -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <defs>
        <filter id="fWaterReflect" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="turbulence"
            baseFrequency="0.020 0.060" numOctaves="2" seed="5" result="n">
            <animate attributeName="baseFrequency"
              values="0.020 0.060;0.028 0.080;0.020 0.060"
              dur="8s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="n"
            scale="12" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>

    <!-- ── Floating petals (JS populates) ── -->
    <div class="rot-petals" id="rotPetals" aria-hidden="true"></div>

    <!-- ── Bird silhouettes ── -->
    <div class="rot-birds" aria-hidden="true">
      <svg class="rot-bird rb1" viewBox="0 0 62 20" fill="none">
        <path d="M2,14 Q13,2 23,12 Q33,2 43,12" stroke="rgba(150,130,210,.55)" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M46,10 Q52,3 61,9"              stroke="rgba(150,130,210,.55)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <svg class="rot-bird rb2" viewBox="0 0 42 14" fill="none">
        <path d="M2,10 Q10,2 18,9 Q26,2 34,9" stroke="rgba(160,140,220,.45)" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <svg class="rot-bird rb3" viewBox="0 0 28 10" fill="none">
        <path d="M2,8 Q7,1 13,6 Q19,1 26,6" stroke="rgba(140,120,200,.40)" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <svg class="rot-bird rb4" viewBox="0 0 52 18" fill="none">
        <path d="M2,13 Q12,2 21,11 Q30,2 39,11" stroke="rgba(150,130,210,.50)" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M42,9 Q47,3 52,8"             stroke="rgba(150,130,210,.50)" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <svg class="rot-bird rb5" viewBox="0 0 22 8" fill="none">
        <path d="M1,6 Q5,1 10,5 Q15,1 21,5" stroke="rgba(140,120,200,.38)" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- ── Main content ── -->
    <main class="rot-content" id="rotContent">

      <p class="rot-eyebrow">A River of Time</p>

      <!-- Names + water reflection — SVG avoids background-clip+filter conflict -->
      <div class="rot-names-block" aria-label="Manish and Arjoo">
        <svg class="rot-names-svg" viewBox="0 0 700 110"
             xmlns="http://www.w3.org/2000/svg" overflow="visible">
          <defs>
            <linearGradient id="nameGold" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#FFF8DC"/>
              <stop offset="25%"  stop-color="#D4AF37"/>
              <stop offset="50%"  stop-color="#F5E27A"/>
              <stop offset="75%"  stop-color="#C9A227"/>
              <stop offset="100%" stop-color="#FFF8DC"/>
            </linearGradient>
            <linearGradient id="reflGold" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.4"/>
              <stop offset="50%"  stop-color="#F5E27A" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.3"/>
            </linearGradient>
            <linearGradient id="rmFade" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"  stop-color="white" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="white" stop-opacity="0"/>
            </linearGradient>
            <mask id="reflMask">
              <rect width="700" height="90" fill="url(#rmFade)"/>
            </mask>
            <filter id="fRipple" x="-15%" y="-30%" width="130%" height="160%">
              <feTurbulence type="turbulence"
                baseFrequency="0.015 0.04" numOctaves="3" seed="8" result="n">
                <animate attributeName="baseFrequency"
                  values="0.015 0.04;0.020 0.055;0.015 0.04"
                  dur="10s" repeatCount="indefinite"/>
              </feTurbulence>
              <feDisplacementMap in="SourceGraphic" in2="n"
                scale="5" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
            <filter id="fReflect" x="-20%" y="-30%" width="140%" height="160%">
              <feTurbulence type="turbulence"
                baseFrequency="0.025 0.07" numOctaves="2" seed="3" result="n">
                <animate attributeName="baseFrequency"
                  values="0.025 0.07;0.035 0.09;0.025 0.07"
                  dur="6s" repeatCount="indefinite"/>
              </feTurbulence>
              <feDisplacementMap in="SourceGraphic" in2="n"
                scale="14" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
          </defs>

          <!-- Real name with gentle ripple -->
          <text x="350" y="80"
                text-anchor="middle"
                font-family="Great Vibes, cursive"
                font-size="96"
                fill="url(#nameGold)"
                filter="url(#fRipple)"
                class="rot-name-text">Manish &amp; Arjoo</text>

          <!-- Water reflection: flipped, turbulent, fading -->
          <g transform="translate(0,170) scale(1,-1)" mask="url(#reflMask)" aria-hidden="true">
            <text x="350" y="80"
                  text-anchor="middle"
                  font-family="Great Vibes, cursive"
                  font-size="96"
                  fill="url(#reflGold)"
                  filter="url(#fReflect)">Manish &amp; Arjoo</text>
          </g>
        </svg>
      </div>

      <!-- River walk scene ──────────────────────────────────────
           Bride walks from left  |  Together rises at center
           Groom walks from right |  Their reflection below waterline
      ─────────────────────────────────────────────────────────── -->
      <div class="rot-river-scene">

        <!-- Bride: walking in from left -->
        <div class="rot-walker rot-bride">
          <p class="rot-walker-name">Arjoo</p>
          <img src="assets/images/bride.jpeg" alt="Arjoo" loading="eager">
        </div>

        <!-- Meeting point: couple appears above waterline, reflects below -->
        <div class="rot-meeting">

          <!-- Above water — the couple photo emerges -->
          <div class="rot-meeting-above">
            <img class="rot-meeting-img"
                 src="assets/images/together.jpeg" alt="Manish &amp; Arjoo">
            <!-- Soft gold glow halo -->
            <div class="rot-meeting-glow" aria-hidden="true"></div>
          </div>

          <!-- Waterline at meeting point -->
          <div class="rot-meeting-line" aria-hidden="true"></div>

          <!-- Below water — animated ripple reflection -->
          <div class="rot-meeting-reflection" aria-hidden="true">
            <img src="assets/images/together.jpeg" alt="">
          </div>

        </div>

        <!-- Groom: walking in from right -->
        <div class="rot-walker rot-groom">
          <p class="rot-walker-name">Manish</p>
          <img src="assets/images/groom.jpeg" alt="Manish" loading="eager">
        </div>

      </div>

      <!-- Divider with wave -->
      <div class="rot-divider" aria-hidden="true">
        <svg viewBox="0 0 240 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,9 Q30,0 60,9 Q90,18 120,9 Q150,0 180,9 Q210,18 240,9"
                stroke="rgba(140,100,20,0.55)" stroke-width="1.2" fill="none"/>
        </svg>
      </div>

      <p class="rot-tagline">Two souls · one river · eternal flow</p>
      <p class="rot-details">26th April 2026 &nbsp;·&nbsp; Anant Mahal, Jaipur</p>

      <a href="index.html" class="rot-cta" id="rotCta">
        <span class="rot-cta-text">Flow Into Our Story</span>
        <span class="rot-cta-ripple" id="rotCtaRipple"></span>
      </a>

    </main>

    <!-- ── Ambient sound toggle ── -->
    <button class="rot-sound" id="rotSound" aria-label="Toggle ambient water sound">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path class="sw1" d="M15.5 8.5a5 5 0 0 1 0 7"/>
        <path class="sw2" d="M19 5a10 10 0 0 1 0 14"/>
      </svg>
    </button>

    <!-- ── Scroll hint ── -->
    <div class="rot-scroll" aria-hidden="true">
      <span></span><span></span>
    </div>

  </div>

  <script src="js/river.js"></script>
</body>
</html>
